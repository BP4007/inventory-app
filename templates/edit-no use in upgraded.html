<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Quantity</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: url('/static/background.jpg') no-repeat center center fixed;
            background-size: cover;
            color: #fff;
        }
        .container {
            background: rgba(0,0,0,0.6);
            padding: 20px;
            border-radius: 15px;
            margin-top: 50px;
        }
    </style>
</head>
<body>
<div class="container text-center">
    <h2>Edit Quantity for {{ item[1] }}</h2>
    <form method="post" class="mb-3">
        <input class="form-control mb-2" type="number" name="quantity" value="{{ item[2] }}">
        <button class="btn btn-primary btn-custom" type="submit">Save</button>
    </form>
    <a class="btn btn-secondary btn-custom" href="/">Back</a>
</div>
</body>
</html>
