<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventory App</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>
<style>
body{background:#f5f5f5}
.navbar{margin-bottom:20px}
.table-container{max-height:300px;overflow-y:auto}
</style>
<script>
let currentTable = "";

function loadTable(table){
    currentTable = table;
    document.getElementById("descDropdown").style.display = "block";
    document.getElementById("manualDesc").style.display = "none";
    document.getElementById("productNo").readOnly = true;

    fetch(`/get_products/${table}`)
    .then(res=>res.json())
    .then(data=>{
        let dropdown=document.getElementById("descDropdown");
        dropdown.innerHTML='<option value="">-- Select Description --</option>';
        data.data.forEach(row=>{
            let opt=document.createElement("option");
            // row[1] is Description, row[0] is Product_No
            opt.value=row[1]; 
            opt.text=row[1];
            opt.dataset.productNo=row[0];
            dropdown.add(opt);
        });
        fillProductNo();
    });
}

function loadOtherItems(){
    currentTable="other";
    document.getElementById("descDropdown").style.display="none";
    document.getElementById("manualDesc").style.display="block";
    document.getElementById("manualDesc").value="";
    document.getElementById("productNo").value="";
    document.getElementById("productNo").readOnly=false;
}

function fillProductNo(){
    let dropdown=document.getElementById("descDropdown");
    if(dropdown.selectedOptions.length && dropdown.value !== ""){
        document.getElementById("productNo").value=dropdown.selectedOptions[0].dataset.productNo;
    } else {
        document.getElementById("productNo").value="";
    }
}

function saveData(){
    let descValue = currentTable === "other" ? document.getElementById("manualDesc").value : document.getElementById("descDropdown").value;
    let productValue = document.getElementById("productNo").value;
    
    let form=new FormData();
    form.append("table",currentTable);
    form.append("product",productValue); // Sending Product No to backend
    form.append("description",descValue);
    form.append("qty",document.getElementById("qty").value);
    form.append("comment",document.getElementById("comment").value);

    fetch("/save",{method:"POST",body:form})
    .then(res=>res.json())
    .then(data=>{
        if(data.error){alert(data.error);} 
        else{
            document.getElementById("qty").value="";
            document.getElementById("comment").value="";
            loadSessionEntries();
        }
    });
}

function loadSessionEntries(){
    fetch("/get_entries")
    .then(res=>res.json())
    .then(data=>{
        let tbody=document.getElementById("entriesBody");
        tbody.innerHTML="";
        data.entries.forEach(row=>{
            let tr=document.createElement("tr");
            tr.innerHTML=`
                <td>${row.product_no}</td>
                <td>${row.description}</td>
                <td><input type="number" value="${row.quantity}" id="qty_${row.id}" class="form-control form-control-sm"></td>
                <td><input type="text" value="${row.comment||''}" id="comment_${row.id}" class="form-control form-control-sm"></td>
                <td>${row.created_at}</td>
                <td>
                    <button class="btn btn-sm btn-primary" onclick="updateEntry(${row.id})">Edit</button>
                    <button class="btn btn-sm btn-danger" onclick="deleteEntry(${row.id})">Delete</button>
                </td>
            `;
            tbody.appendChild(tr);
        });
    });
}

function updateEntry(id){
    let qty=document.getElementById(`qty_${id}`).value;
    let comment=document.getElementById(`comment_${id}`).value;
    let form=new FormData();
    form.append("id",id);
    form.append("qty",qty);
    form.append("comment",comment);

    fetch("/update_entry",{method:"POST",body:form})
    .then(res=>res.json())
    .then(data=>{loadSessionEntries();});
}

function deleteEntry(id){
    if(!confirm("Delete this entry?")) return;
    let form=new FormData();
    form.append("id",id);

    fetch("/delete_entry",{method:"POST",body:form})
    .then(res=>res.json())
    .then(data=>{loadSessionEntries();});
}

function completeReport(){
    if(!confirm("Mark this report as Complete?")) return;

    fetch("/complete_report",{method:"POST"})
    .then(res=>res.json())
    .then(data=>{
        if(data.error){ alert(data.error); return; }
        alert("Report completed!");
        document.getElementById("entriesBody").innerHTML="";
        document.getElementById("completeBtn").style.display="none";
    });
}

function toggleCompleteBtn(){
    let active = "{{ session.get('session_id') }}";
    if(active){
        document.getElementById("completeBtn").style.display="inline-block";
    }
}

function handleTableSelection(value){
    if(!value) return;
    loadTable(value);
    document.querySelector(".toolbar select").value = "";
}

window.onload = function(){
    loadSessionEntries();
    toggleCompleteBtn();
}
</script>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
<div class="container-fluid">
<a class="navbar-brand" href="#">Inventory</a>
<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
<span class="navbar-toggler-icon"></span>
</button>
<div class="collapse navbar-collapse" id="navbarNav">
<ul class="navbar-nav me-auto">
<li class="nav-item"><a class="nav-link btn btn-sm btn-secondary me-2" href="/start_session">Start New Report</a></li>
<li class="nav-item"><a class="nav-link btn btn-sm btn-info me-2" href="/export">Export</a></li>
<li class="nav-item"><a class="nav-link btn btn-sm btn-warning me-2" href="/reports">View Reports</a></li>
<li class="nav-item"><a class="nav-link btn btn-sm btn-danger" href="/logout">Logout</a></li>
</ul>
</div>
</div>
</nav>

<div class="container">

<div class="toolbar mb-3 d-flex gap-2">
<select class="form-select w-auto" style="background-color:#D8A1A8; color:black;" onchange="handleTableSelection(this.value)">
<option value="">-- Select Category --</option>
<option value="Icecream">Ice Cream</option>
<option value="Icecream_cake">Ice Cream Cakes</option>
<option value="Kitchen">Kitchen</option>
<option value="Non_Perishable">Non Perishable Products</option>
<option value="Labels">Printed Labels</option>
<option value="case_chocolate">Case Chocolates</option>
</select>

<button class="btn btn-warning" onclick="loadOtherItems()">
Other Required Items
</button>
</div>

<div class="card p-3">
<div class="row g-2 align-items-center">

<div class="col-md-4">
<select id="descDropdown" class="form-select" onchange="fillProductNo()">
    <option value="">-- Select Description --</option>
</select>
<input id="manualDesc" class="form-control mt-1" placeholder="Enter Description" style="display:none;">
</div>

<div class="col-md-2">
<input id="productNo" class="form-control" placeholder="Product No" readonly>
</div>

<div class="col-md-2">
<input id="qty" class="form-control" type="number" placeholder="Quantity">
</div>

<div class="col-md-4">
<input id="comment" class="form-control" placeholder="Comment (optional)">
</div>

</div>

<div class="mt-2 d-flex gap-2">
<button class="btn btn-warning flex-fill" onclick="saveData()">Save Entry</button>
<button class="btn btn-success flex-fill" id="completeBtn" onclick="completeReport()" style="display:none;">Complete Report</button>
</div>
</div>

<h5 class="mt-3">Entries (Current Session)</h5>

<div class="table-container card p-3">
<table class="table table-striped table-bordered table-sm mb-0">
<thead>
<tr>
<th>Product</th><th>Description</th><th>Qty</th><th>Comment</th><th>Timestamp</th><th>Actions</th>
</tr>
</thead>
<tbody id="entriesBody"></tbody>
</table>
</div>

</div>
</body>
</html>
