<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventory App</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>
<style>
body{background:#f5f5f5}
.navbar{margin-bottom:20px}
.table-container{max-height:300px;overflow-y:auto}
</style>
<script>
let currentTable = "";

function loadTable(table){
    currentTable = table;
    document.getElementById("product").style.display = "block";
    document.getElementById("manualProduct").style.display = "none";
    document.getElementById("desc").readOnly = true;
    fetch(`/get_products/${table}`)
    .then(res=>res.json())
    .then(data=>{
        let dropdown=document.getElementById("product");
        dropdown.innerHTML="";
        data.data.forEach(row=>{
            let opt=document.createElement("option");
            opt.value=row[0];
            opt.text=row[0];
            opt.dataset.desc=row[1];
            dropdown.add(opt);
        });
        fillDescription();
    });
}

function loadOtherItems(){
    currentTable="other";
    document.getElementById("product").style.display="none";
    document.getElementById("manualProduct").style.display="block";
    document.getElementById("manualProduct").value="";
    document.getElementById("desc").value="";
    document.getElementById("desc").readOnly=false;
}

function fillDescription(){
    let dropdown=document.getElementById("product");
    if(dropdown.selectedOptions.length){
        document.getElementById("desc").value=dropdown.selectedOptions[0].dataset.desc;
    } else {document.getElementById("desc").value="";}
}

function saveData(){
    let productValue=currentTable==="other"?document.getElementById("manualProduct").value:document.getElementById("product").value;
    let form=new FormData();
    form.append("table",currentTable);
    form.append("product",productValue);
    form.append("description",document.getElementById("desc").value);
    form.append("qty",document.getElementById("qty").value);
    form.append("comment",document.getElementById("comment").value);
    fetch("/save",{method:"POST",body:form})
    .then(res=>res.json())
    .then(data=>{
        if(data.error){alert(data.error);} 
        else{
            document.getElementById("qty").value="";
            document.getElementById("comment").value="";
            loadSessionEntries();
        }
    });
}

function loadSessionEntries(){
    fetch("/get_entries")
    .then(res=>res.json())
    .then(data=>{
        let tbody=document.getElementById("entriesBody");
        tbody.innerHTML="";
        data.entries.forEach(row=>{
            let tr=document.createElement("tr");
            tr.innerHTML=`
                <td>${row.product_no}</td>
                <td>${row.description}</td>
                <td><input type="number" value="${row.quantity}" id="qty_${row.id}" class="form-control form-control-sm"></td>
                <td><input type="text" value="${row.comment||''}" id="comment_${row.id}" class="form-control form-control-sm"></td>
                <td>${row.created_at}</td>
                <td>
                    <button class="btn btn-sm btn-primary" onclick="updateEntry(${row.id})">Edit</button>
                    <button class="btn btn-sm btn-danger" onclick="deleteEntry(${row.id})">Delete</button>
                </td>
            `;
            tbody.appendChild(tr);
        });
    });
}

function updateEntry(id){
    let qty=document.getElementById(`qty_${id}`).value;
    let comment=document.getElementById(`comment_${id}`).value;
    let form=new FormData();
    form.append("id",id);
    form.append("qty",qty);
    form.append("comment",comment);
    fetch("/update_entry",{method:"POST",body:form})
    .then(res=>res.json())
    .then(data=>{loadSessionEntries();});
}

function deleteEntry(id){
    if(!confirm("Delete this entry?")) return;
    let form=new FormData();
    form.append("id",id);
    fetch("/delete_entry",{method:"POST",body:form})
    .then(res=>res.json())
    .then(data=>{loadSessionEntries();});
}

// ---------- COMPLETE REPORT ----------
function completeReport(){
    if(!confirm("Mark this report as Complete?")) return;
    fetch("/complete_report",{method:"POST"})
    .then(res=>res.json())
    .then(data=>{
        if(data.error){ alert(data.error); return; }
        alert("Report completed!");
        document.getElementById("entriesBody").innerHTML="";
        document.getElementById("completeBtn").style.display="none";
    });
}

// Show Complete button if session active
function toggleCompleteBtn(){
    let active = "{{ session.get('session_id') }}";
    if(active){
        document.getElementById("completeBtn").style.display="inline-block";
    }
}

window.onload = function(){
    loadSessionEntries();
    toggleCompleteBtn();
}
</script>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
<div class="container-fluid">
<a class="navbar-brand" href="#">Inventory</a>
<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
<span class="navbar-toggler-icon"></span>
</button>
<div class="collapse navbar-collapse" id="navbarNav">
<ul class="navbar-nav me-auto">
<li class="nav-item"><a class="nav-link btn btn-sm btn-secondary me-2" href="/start_session">Start New Report</a></li>
<li class="nav-item"><a class="nav-link btn btn-sm btn-info me-2" href="/export">Export</a></li>
<li class="nav-item"><a class="nav-link btn btn-sm btn-warning me-2" href="/reports">View Reports</a></li>
<li class="nav-item"><a class="nav-link btn btn-sm btn-danger" href="/logout">Logout</a></li>
</ul>
</div>
</div>
</nav>

<div class="container">
<div class="toolbar mb-3">
<button class="btn btn-primary" onclick="loadTable('Icecream')">Ice Cream</button>
<button class="btn btn-success" onclick="loadTable('case_chocolate')">Case Chocolates</button>
<button class="btn btn-warning" onclick="loadOtherItems()">Other Required Items</button>
</div>

<div class="card p-3">
<div class="row g-2 align-items-center">
<div class="col-md-3">
<select id="product" class="form-select" onchange="fillDescription()"></select>
<input id="manualProduct" class="form-control mt-1" placeholder="Enter Product No" style="display:none;">
</div>
<div class="col-md-3"><input id="desc" class="form-control" placeholder="Description" readonly></div>
<div class="col-md-2"><input id="qty" class="form-control" type="number" placeholder="Quantity"></div>
<div class="col-md-4"><input id="comment" class="form-control" placeholder="Comment (optional)"></div>
</div>
<div class="mt-2 d-flex gap-2">
    <button class="btn btn-warning flex-fill" onclick="saveData()">Save Entry</button>
    <button class="btn btn-success flex-fill" id="completeBtn" onclick="completeReport()" style="display:none;">Complete Report</button>
</div>
</div>

<h5 class="mt-3">Entries (Current Session)</h5>
<div class="table-container card p-3">
<table class="table table-striped table-bordered table-sm mb-0">
<thead>
<tr>
<th>Product</th><th>Description</th><th>Qty</th><th>Comment</th><th>Timestamp</th><th>Actions</th>
</tr>
</thead>
<tbody id="entriesBody"></tbody>
</table>
</div>
</div>
</body>
</html>
