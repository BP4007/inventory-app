<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventory App</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>

<style>
body {
    background: #f5f5f5;
}
.navbar {
    margin-bottom: 20px;
}
.toolbar button {
    margin-right: 10px;
}
.card {
    margin-bottom: 20px;
}
.table-container {
    max-height: 300px;
    overflow-y: auto;
}
</style>

<script>
let currentTable = "";

// Load products into dropdown
function loadTable(table){
    currentTable = table;
    fetch(`/get_products/${table}`)
    .then(res => res.json())
    .then(data => {
        let dropdown = document.getElementById("product");
        dropdown.innerHTML = "";
        data.data.forEach(row => {
            let opt = document.createElement("option");
            opt.value = row[0];
            opt.text = row[0];
            opt.dataset.desc = row[1];
            dropdown.add(opt);
        });
        fillDescription();
    });
}

// Auto-fill description
function fillDescription(){
    let dropdown = document.getElementById("product");
    if(dropdown.selectedOptions.length){
        document.getElementById("desc").value = dropdown.selectedOptions[0].dataset.desc;
    } else {
        document.getElementById("desc").value = "";
    }
}

// Save data and refresh table
function saveData(){
    let form = new FormData();
    form.append("table", currentTable);
    form.append("product", document.getElementById("product").value);
    form.append("description", document.getElementById("desc").value);
    form.append("qty", document.getElementById("qty").value);

    fetch("/save", {method:"POST", body:form})
    .then(res => res.json())
    .then(data => {
        if(data.error){
            alert(data.error);
        } else {
            document.getElementById("qty").value = "";
            loadSessionEntries();
        }
    });
}

// Load entries for this session
function loadSessionEntries(){
    fetch("/get_entries")
    .then(res => res.json())
    .then(data => {
        let tbody = document.getElementById("entriesBody");
        tbody.innerHTML = "";
        data.entries.forEach(row => {
            let tr = document.createElement("tr");
            tr.innerHTML = `
                <td>${row.product_no}</td>
                <td>${row.description}</td>
                <td>${row.quantity}</td>
                <td>${row.created_at}</td>
            `;
            tbody.appendChild(tr);
        });
    });
}

// Auto-refresh every time page loads
window.onload = function(){
    loadSessionEntries();
};
</script>
</head>

<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">Inventory</a>
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item"><a class="nav-link btn btn-sm btn-secondary me-2" href="/start_session">Start New Report</a></li>
        <li class="nav-item"><a class="nav-link btn btn-sm btn-info me-2" href="/export">Export</a></li>
        <li class="nav-item"><a class="nav-link btn btn-sm btn-danger" href="/logout">Logout</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="container">
  <div class="toolbar mb-3">
    <button class="btn btn-primary" onclick="loadTable('Icecream')">Ice Cream</button>
    <button class="btn btn-success" onclick="loadTable('case_chocolate')">Case Chocolates</button>
  </div>

  <div class="card p-3">
    <div class="row g-2 align-items-center">
      <div class="col-md-3">
        <select id="product" class="form-select" onchange="fillDescription()"></select>
      </div>
      <div class="col-md-4">
        <input id="desc" class="form-control" placeholder="Description" readonly>
      </div>
      <div class="col-md-2">
        <input id="qty" class="form-control" type="number" placeholder="Quantity">
      </div>
      <div class="col-md-3">
        <button class="btn btn-warning w-100" onclick="saveData()">Save Entry</button>
      </div>
    </div>
  </div>

  <h5>Entries (Current Session)</h5>
  <div class="table-container card p-3">
    <table class="table table-striped table-bordered table-sm mb-0">
      <thead>
        <tr>
          <th>Product</th>
          <th>Description</th>
          <th>Qty</th>
          <th>Timestamp</th>
        </tr>
      </thead>
      <tbody id="entriesBody"></tbody>
    </table>
  </div>
</div>
</body>
</html>
