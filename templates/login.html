<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: url('/static/background.jpg') no-repeat center center fixed;
            background-size: cover;
        }
        .login-container {
            max-width: 400px;
            margin: 80px auto;
            padding: 30px;
            background: rgba(0,0,0,0.65);
            border-radius: 15px;
            color: #fff;
        }
        .login-container h2 {
            margin-bottom: 20px;
        }
        .form-control {
            font-size: 16px;
        }
        .btn-custom {
            font-size: 16px;
        }
        @media (max-width: 576px) {
            .login-container {
                margin: 40px 15px;
                padding: 20px;
            }
        }
    </style>
</head>
<body>
<div class="login-container text-center">
    <h2>Login</h2>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="mb-3">
        {% for category, msg in messages %}
          <div class="alert alert-{{ 'success' if category=='success' else 'warning' }}">{{ msg }}</div>
        {% endfor %}
        </div>
      {% endif %}
    {% endwith %}
    <form method="post">
        <input class="form-control mb-3" type="text" name="username" placeholder="Username" required>
        <input class="form-control mb-3" type="password" name="password" placeholder="Password" required>
        <button class="btn btn-primary btn-custom w-100">Login</button>
    </form>
</div>
</body>
</html>
