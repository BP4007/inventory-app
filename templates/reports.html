<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Saved Reports</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body { background:#f5f7fa; }
.card { border-radius:1rem; box-shadow:0 0 10px rgba(0,0,0,0.05); }
</style>
</head>
<body>
<div class="container mt-4">
<h3>Saved Reports</h3>
<a href="/" class="btn btn-secondary mb-3">Back</a>
<table class="table table-bordered table-striped table-hover">
<thead class="table-dark">
<tr>
<th>Start Time</th>
<th>Entries</th>
<th>Status</th>
<th>Actions</th>
</tr>
</thead>
<tbody>
{% for r in reports %}
<tr>
<td>{{ r.start_time }}</td>
<td>{{ r.count }}</td>
<td>{% if r.completed %}✅ Completed{% else %}In Progress{% endif %}</td>
<td>
<a href="/load_report/{{ r.session_id }}" class="btn btn-sm btn-primary">Open</a>
<a href="/export?sid={{ r.session_id }}" class="btn btn-sm btn-success">Export</a>
</td>
</tr>
{% endfor %}
</tbody>
</table>
</div>
</body>
</html>
