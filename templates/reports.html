<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Saved Reports</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body{background:#f3e6e6;}
table th, table td{vertical-align:middle;}
.status-completed{color:#fff; background:#800000; border-radius:4px; padding:2px 6px;}
.status-progress{color:#fff; background:#c04040; border-radius:4px; padding:2px 6px;}
</style>
</head>
<body class="bg-light">
<div class="container mt-4">
<h3 class="mb-3">Saved Reports</h3>
<a href="/" class="btn btn-secondary mb-3">Back</a>
<table class="table table-bordered table-striped">
<thead>
<tr>
<th>Report Name</th>
<th>Start Time</th>
<th>Entries</th>
<th>Status</th>
<th>Actions</th>
</tr>
</thead>
<tbody>
{% for r in reports %}
<tr>
<td>{{ r.report_name }}</td>
<td>{{ r.start_time }}</td>
<td>{{ r.count }}</td>
<td>
<span class="status-{{ 'completed' if r.status=='Completed' else 'progress' }}">{{ r.status }}</span>
</td>
<td>
<a href="/load_report/{{ r.session_id }}" class="btn btn-sm btn-primary">Open</a>
<a href="/export?sid={{ r.session_id }}" class="btn btn-sm btn-success">Export</a>
</td>
</tr>
{% endfor %}
</tbody>
</table>
</div>
</body>
</html>
